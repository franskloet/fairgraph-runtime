    platform: linux/amd64
    container_name: questionnaires_fuseki_db
    ports:
      - "3033:3030"
    environment:
      - ADMIN_PASSWORD=admin
    volumes:
      - questionnaires_fuseki-data:/fuseki
      - ./config/questionnaires_fuseki_config.ttl:/fuseki/config.ttl
    command: [ "/jena-fuseki/fuseki-server", "--config=/fuseki/config.ttl" ]
