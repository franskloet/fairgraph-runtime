name: "Questionnaires"
description: "Standard definition mapping Project, Medical Study, Outcomes, Methods, Instrumentation, Dataset, and Manufacturer metadata."
classes:
  - name: "Project"
    uri: "http://schema.org/ResearchProject"
    properties:
      - name: "Identifier"
        path: "dcterms:identifier"
      - name: "Title"
        path: "dcterms:title"
      - name: "Description"
        path: "rdfs:comment"

  - name: "Study"
    uri: "http://schema.org/MedicalStudy"
    properties:
      - name: "Identifier"
        path: "dcterms:identifier"
      - name: "Title"
        path: "dcterms:title"
      - name: "Description"
        path: "rdfs:comment"

  - name: "Outcome"
    uri: "https://fairgraph.nl/ontology/custom#Outcome"
    properties:
      - name: "Identifier"
        path: "dcterms:identifier"
      - name: "Title"
        path: "dcterms:title"
      - name: "Description"
        path: "rdfs:comment"

  - name: "Method"
    uri: "https://fairgraph.nl/ontology/custom#Method"
    properties:
      - name: "Identifier"
        path: "dcterms:identifier"
      - name: "Title"
        path: "dcterms:title"
      - name: "Description"
        path: "rdfs:comment"

  - name: "Instrumentation"
    uri: "https://fairgraph.nl/ontology/custom#Instrumentation"
    properties:
      - name: "Identifier"
        path: "dcterms:identifier"
      - name: "Title"
        path: "dcterms:title"
      - name: "Description"
        path: "rdfs:comment"
      - name: "Instrument type"
        path: "https://fairgraph.nl/ontology/custom#Instrument_type"

  - name: "Dataset"
    uri: "http://www.w3.org/ns/dcat#Dataset"
    properties:
      - name: "Identifier"
        path: "dcterms:identifier"
      - name: "Title"
        path: "dcterms:title"
      - name: "Description"
        path: "rdfs:comment"
      - name: "Dataset type"
        path: "https://fairgraph.nl/ontology/custom#Dataset_type"
      - name: "Format"
        path: "https://fairgraph.nl/ontology/custom#Format"
      - name: "Access rights"
        path: "https://fairgraph.nl/ontology/custom#Access_rights"
      - name: "Active"
        path: "https://fairgraph.nl/ontology/custom#Active"

  - name: "Manufacturer"
    uri: "https://fairgraph.nl/ontology/custom#Manufacturer"
    properties:
      - name: "Identifier"
        path: "dcterms:identifier"
      - name: "Title"
        path: "dcterms:title"
      - name: "Description"
        path: "rdfs:comment"
