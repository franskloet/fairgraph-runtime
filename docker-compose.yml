      - FUSEKI_BASE_URL=http://genomic_fuseki:3030/ds
      - ADMIN_PASSWORD=admin
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - LLM_PROVIDER=${LLM_PROVIDER}
      - LLM_MODEL=${LLM_MODEL}
      - OLLAMA_MODEL=${OLLAMA_MODEL}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL}
      - VOCAB_PATH=./vocabulary/genomic_vocabulary.ttl
      - AUTH_MODE=oidc
      - OIDC_ISSUER_URL=http://localhost:8000
      - OIDC_JWKS_URL=http://central_router:8000/.well-known/jwks.json
    depends_on:
      genomic_fuseki:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --method=GET http://127.0.0.1:8000/health -O /dev/null || exit 1" ]
      interval: 10s
      timeout: 3s
      retries: 20
      start_period: 30s
    extra_hosts:
      - "host.docker.internal:host-gateway"

