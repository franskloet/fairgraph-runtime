name: "ISATAB"
description: "ISA-Tab standard definition mapping Investigation, Study, Sample, and Assay metadata for metabolomics studies."
classes:
  - name: "Investigation"
    uri: "https://fairgraph.nl"
    properties:
      - name: "Identifier"
        path: "dcterms:identifier"
      - name: "Title"
        path: "dcterms:title"
      - name: "Description"
        path: "rdfs:comment"
      - name: "Submission Date"
        path: "dcterms:dateSubmitted"
      - name: "Public Release Date"
        path: "dcterms:available"
      - name: "License"
        path: "dcterms:license"

  - name: "Study"
    uri: "https://fairgraph.nl"
    properties:
      - name: "Identifier"
        path: "dcterms:identifier"
      - name: "Title"
        path: "dcterms:title"
      - name: "Description"
        path: "rdfs:comment"
      - name: "Study File Name"
        path: "dcterms:alternative"

  - name: "Sample"
    uri: "https://fairgraph.nl"
    properties:
      - name: "Identifier"
        path: "dcterms:identifier"
      - name: "Source Name"
        path: "dcterms:source"
      - name: "Organism"
        path: "http://obolibrary.org"
      - name: "Characteristics"
        path: "dcterms:description"

  - name: "Assay"
    uri: "https://fairgraph.nl"
    properties:
      - name: "Identifier"
        path: "dcterms:identifier"
      - name: "Measurement Type"
        path: "dcterms:type"
      - name: "Technology Type"
        path: "dcterms:type"
      - name: "Technology Platform"
        path: "dcterms:publisher"
