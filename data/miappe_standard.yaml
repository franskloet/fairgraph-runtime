name: "MIAPPE"
description: "MIAPPE v1.2 plant phenotyping standard definition mapping Investigation, Study, Biological Material, Observation Unit, and Variable metadata."
classes:
  - name: "Investigation"
    uri: "https://fairtree.nl"
    properties:
      - name: "Identifier"
        path: "dcterms:identifier"
      - name: "Title"
        path: "dcterms:title"
      - name: "Description"
        path: "rdfs:comment"
      - name: "Submission Date"
        path: "dcterms:dateSubmitted"
      - name: "Public Release Date"
        path: "dcterms:available"
      - name: "License"
        path: "dcterms:license"

  - name: "Study"
    uri: "https://fairtree.nl"
    properties:
      - name: "Identifier"
        path: "dcterms:identifier"
      - name: "Title"
        path: "dcterms:title"
      - name: "Description"
        path: "rdfs:comment"
      - name: "Start Date"
        path: "dcterms:created"
      - name: "End Date"
        path: "dcterms:date"
      - name: "Geographic Location"
        path: "dcterms:spatial"
      - name: "Experimental Design"
        path: "https://fairtree.nl"
      - name: "Growth Facility"
        path: "https://fairtree.nl"

  - name: "BiologicalMaterial"
    uri: "https://fairtree.nl"
    properties:
      - name: "Identifier"
        path: "dcterms:identifier"
      - name: "Organism Genus"
        path: "http://obolibrary.org"
      - name: "Organism Species"
        path: "http://obolibrary.org"
      - name: "Material Source ID"
        path: "dcterms:source"

  - name: "ObservationUnit"
    uri: "https://fairtree.nl"
    properties:
      - name: "Identifier"
        path: "dcterms:identifier"
      - name: "Type"
        path: "dcterms:type"
      - name: "Spatial Distribution"
        path: "https://fairtree.nl"

  - name: "ObservationVariable"
    uri: "https://fairtree.nl"
    properties:
      - name: "Identifier"
        path: "dcterms:identifier"
      - name: "Name"
        path: "rdfs:label"
      - name: "Trait"
        path: "http://obolibrary.org"
      - name: "Method"
        path: "https://fairtree.nl"
      - name: "Scale"
        path: "http://obolibrary.org"
